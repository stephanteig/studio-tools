name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to stephanteig.github.io
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone https://x-access-token:${{ secrets.PAGES_TOKEN }}@github.com/stephanteig/stephanteig.github.io.git pages-repo
          rm -rf pages-repo/studio-tools
          mkdir -p pages-repo/studio-tools
          cp -r dist/* pages-repo/studio-tools/
          cd pages-repo
          git add .
          git diff --cached --quiet || git commit -m "deploy: update studio-tools from ${{ github.sha }}"
          git push
